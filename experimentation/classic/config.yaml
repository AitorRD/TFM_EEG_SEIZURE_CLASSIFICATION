# GENERAL
experiment:
  name: "eeg_seizure_experiment"
  type: "ml"
  random_state: 42
  n_jobs: -1
  device: "cuda"
  output_suffix: ""

# PATHS
paths:
  data:
    train: "data/processed/windowed/dataset_windowed_train.csv"
    val: "data/processed/windowed/dataset_windowed_val.csv"
    test: "data/processed/windowed/dataset_windowed_test.csv"
  features:
    train: "data/processed/features_train.csv"
    val: "data/processed/features_val.csv"
    test: "data/processed/features_test.csv"
  labels:
    train: "data/processed/labels_train.csv"
    val: "data/processed/labels_val.csv"
    test: "data/processed/labels_test.csv"
  selected_features: "data/processed/selected_features.csv"
  models_dir: "data/processed/models"
  results:
    metrics: "images/results/ml_test_metrics.png"
    xai_dir: "images/xai"
    optuna_dir: "data/processed/optuna_results"
    predictions_dir: "images/results/csv"

# FEATURE EXTRACTION (TSFRESH)
feature_extraction:
  enabled: true
  custom_fc_parameters:
    absolute_sum_of_changes: null
    mean_abs_change: null
    longest_strike_above_mean: null
    longest_strike_below_mean: null
    number_peaks:
      - n: 3
      - n: 5
    root_mean_square: null
    autocorrelation:
      - lag: 1

# FEATURE SELECTION
feature_selection:
  enabled: true
  method: "SelectKBest"
  k: 50

# CROSS VALIDATION
cross_validation:
  enabled: true
  n_folds: 5
  shuffle: true
  scoring: "f1_weighted"

# OPTUNA OPTIMIZATION
optuna:
  enabled: true
  n_trials: 150
  timeout: null
  n_startup_trials: 15
  n_warmup_steps: 8
  pruner: "median"
  show_progress_bar: true
  save_visualizations: true

# ML MODELS
models:
  lr:
    name: "Logistic Regression"
    enabled: false
    default_params:
      max_iter: 1000
      class_weight: "balanced"
    optuna_search_space:
      C:
        type: "loguniform"
        low: 0.001
        high: 100
      solver:
        type: "categorical"
        choices: ["lbfgs", "liblinear", "saga"]
      max_iter:
        type: "int"
        low: 1000
        high: 3000

  rf:
    name: "Random Forest"
    enabled: false
    default_params:
      class_weight: "balanced"
    optuna_search_space:
      n_estimators:
        type: "int"
        low: 50
        high: 300
      max_depth:
        type: "int"
        low: 10
        high: 50
      min_samples_split:
        type: "int"
        low: 2
        high: 10
      min_samples_leaf:
        type: "int"
        low: 1
        high: 4

  svc:
    name: "Support Vector Classifier"
    enabled: false
    default_params:
      probability: true
      class_weight: "balanced"
    optuna_search_space:
      C:
        type: "loguniform"
        low: 0.1
        high: 100
      kernel:
        type: "categorical"
        choices: ["linear", "rbf", "poly"]
      gamma:
        type: "categorical"
        choices: ["scale", "auto"]

  knn:
    name: "K-Nearest Neighbors"
    enabled: false
    default_params: {}
    optuna_search_space:
      n_neighbors:
        type: "int"
        low: 3
        high: 15
      weights:
        type: "categorical"
        choices: ["uniform", "distance"]
      metric:
        type: "categorical"
        choices: ["euclidean", "manhattan", "minkowski"]

  xgb:
    name: "XGBoost"
    enabled: true
    default_params:
      use_label_encoder: false
      eval_metric: "logloss"
    optuna_search_space:
      n_estimators:
        type: "int"
        low: 50
        high: 300
      max_depth:
        type: "int"
        low: 3
        high: 10
      learning_rate:
        type: "loguniform"
        low: 0.001
        high: 0.3
      subsample:
        type: "uniform"
        low: 0.6
        high: 1.0
      colsample_bytree:
        type: "uniform"
        low: 0.6
        high: 1.0

# XAI - EXPLAINABILITY
xai:
  enabled: true
  methods:
    shap:
      enabled: true
      background_samples: 100
      top_features: 10
    lime:
      enabled: false
      n_samples: 50
      top_features: 10
      discretize_continuous: true

# METRICS
metrics:
  - accuracy
  - precision
  - recall
  - f1_score
  - f1_macro
  - f1_micro
  - roc_auc

# DEEP LEARNING
deep_learning:
  enabled: true
  epochs: 80
  batch_size: 128
  early_stopping:
    enabled: true
    patience: 15
    min_delta: 0.0005
    monitor: "val_f1"
  lr_scheduler:
    enabled: true
    type: "ReduceLROnPlateau"
    factor: 0.5
    patience: 5
    mode: "max"
  data_format: "raw"
  input_channels: 19
  sequence_length: 3000

# DL MODELS
dl_models:
  transformer:
    name: "EEG Transformer"
    enabled: false
    default_params:
      input_dim: 19
      seq_len: 3000
      d_model: 64
      nhead: 4
      num_layers: 2
      dropout: 0.1
      num_classes: 2
    optuna_search_space:
      lr:
        type: "loguniform"
        low: 0.00001
        high: 0.001
      d_model:
        type: "categorical"
        choices: [32, 64, 128]
      nhead:
        type: "categorical"
        choices: [2, 4, 8]
      num_layers:
        type: "int"
        low: 1
        high: 4
      dropout:
        type: "uniform"
        low: 0.1
        high: 0.5
      weight_decay:
        type: "loguniform"
        low: 0.00001
        high: 0.01

  cnn:
    name: "1D CNN"
    enabled: true
    default_params:
      input_features: 50
      conv1_channels: 128
      conv2_channels: 256
      fc_hidden: 128
      dropout: 0.4
      num_classes: 2
    optuna_search_space:
      lr:
        type: "loguniform"
        low: 0.00001
        high: 0.001
      conv1_channels:
        type: "categorical"
        choices: [64, 128, 256]
      conv2_channels:
        type: "categorical"
        choices: [128, 256, 512]
      fc_hidden:
        type: "categorical"
        choices: [64, 128, 256]
      dropout:
        type: "uniform"
        low: 0.2
        high: 0.6
      weight_decay:
        type: "loguniform"
        low: 0.00001
        high: 0.01

  lstm:
    name: "LSTM RNN"
    enabled: true
    default_params:
      input_dim: 19
      hidden_dim: 256
      num_layers: 3
      dropout: 0.3
      bidirectional: true
      num_classes: 2
    optuna_search_space:
      lr:
        type: "loguniform"
        low: 0.00001
        high: 0.001
      hidden_dim:
        type: "categorical"
        choices: [128, 256, 512]
      num_layers:
        type: "int"
        low: 2
        high: 4
      dropout:
        type: "uniform"
        low: 0.1
        high: 0.5
      weight_decay:
        type: "loguniform"
        low: 0.00001
        high: 0.01

  gru:
    name: "GRU RNN"
    enabled: true
    default_params:
      input_dim: 19
      hidden_dim: 256
      num_layers: 3
      dropout: 0.3
      bidirectional: true
      num_classes: 2
    optuna_search_space:
      lr:
        type: "loguniform"
        low: 0.00001
        high: 0.001
      hidden_dim:
        type: "categorical"
        choices: [128, 256, 512]
      num_layers:
        type: "int"
        low: 2
        high: 4
      dropout:
        type: "uniform"
        low: 0.1
        high: 0.5
      weight_decay:
        type: "loguniform"
        low: 0.00001
        high: 0.01